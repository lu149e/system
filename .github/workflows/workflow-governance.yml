name: workflow-governance

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"

concurrency:
  group: workflow-governance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1
