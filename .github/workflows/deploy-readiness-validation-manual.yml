name: deploy-readiness-validation-manual

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: "Runner target"
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted-auth-local
      strict_validation:
        description: "Fail when optional tooling is unavailable"
        required: true
        default: true
        type: boolean
      image_digest:
        description: "Production image digest (sha256:...)"
        required: true
        type: string
      ingress_host:
        description: "Production ingress host"
        required: true
        type: string
      tls_secret_name:
        description: "TLS secret name for ingress"
        required: true
        type: string
      postgres_cidr:
        description: "PostgreSQL egress CIDR"
        required: true
        type: string
      redis_cidr:
        description: "Redis egress CIDR"
        required: true
        type: string
      enforce_database_tls:
        description: "Set ENFORCE_DATABASE_TLS in generated production overlay"
        required: true
        default: true
        type: boolean
      enforce_redis_tls:
        description: "Set ENFORCE_REDIS_TLS in generated production overlay"
        required: true
        default: true
        type: boolean

jobs:
  deploy-readiness-validation:
    runs-on: ${{ github.event.inputs.runner_target == 'self-hosted-auth-local' && fromJson('["self-hosted","linux","x64","auth-local"]') || 'ubuntu-latest' }}
    env:
      KUSTOMIZE_VERSION: "5.4.3"
      KUBECONFORM_VERSION: "0.6.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned validation tooling
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

          install_bin() {
            local src="$1"
            local name="$2"
            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              sudo install -m 0755 "${src}" "/usr/local/bin/${name}"
            else
              install -m 0755 "${src}" "${HOME}/.local/bin/${name}"
            fi
          }

          curl -sSL -o /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          install_bin /tmp/kustomize kustomize

          curl -sSL -o /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          install_bin /tmp/kubeconform kubeconform

      - name: Verify installed validation tooling
        run: |
          set -euo pipefail
          kustomize version
          kubeconform -v

      - name: Ensure deploy scripts are executable
        run: chmod +x scripts/validate-deploy-readiness.sh scripts/generate-production-overlay.sh

      - name: Generate production overlay
        env:
          IMAGE_DIGEST: ${{ github.event.inputs.image_digest }}
          INGRESS_HOST: ${{ github.event.inputs.ingress_host }}
          TLS_SECRET_NAME: ${{ github.event.inputs.tls_secret_name }}
          POSTGRES_CIDR: ${{ github.event.inputs.postgres_cidr }}
          REDIS_CIDR: ${{ github.event.inputs.redis_cidr }}
          ENFORCE_DATABASE_TLS: ${{ github.event.inputs.enforce_database_tls }}
          ENFORCE_REDIS_TLS: ${{ github.event.inputs.enforce_redis_tls }}
        run: ./scripts/generate-production-overlay.sh

      - name: Run deploy readiness validation
        id: validate
        env:
          STRICT_DEPLOY_VALIDATION: ${{ github.event.inputs.strict_validation }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/deploy-readiness
          log_file="artifacts/deploy-readiness/validation.log"

          set +e
          ./scripts/validate-deploy-readiness.sh 2>&1 | tee "${log_file}"
          exit_code=${PIPESTATUS[0]}
          set -e

          echo "validation_exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"

      - name: Upload deploy readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-readiness-validation-${{ github.run_id }}
          path: artifacts/deploy-readiness

      - name: Enforce validation result
        if: ${{ steps.validate.outputs.validation_exit_code != '0' }}
        run: |
          echo "Deploy readiness validation failed. Check uploaded artifact logs." >&2
          exit 1
