name: dependabot-auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify update risk
        run: |
          echo "ecosystem=${{ steps.metadata.outputs.package-ecosystem }}"
          echo "update_type=${{ steps.metadata.outputs.update-type }}"
          echo "dependency_type=${{ steps.metadata.outputs.dependency-type }}"

      - name: Enable auto-merge for low-risk Actions updates
        if: >-
          steps.metadata.outputs.package-ecosystem == 'github-actions' &&
          (
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            steps.metadata.outputs.update-type == 'version-update:semver-minor'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --rebase "$PR_URL"

      - name: Skip auto-merge for runtime or high-risk updates
        if: >-
          steps.metadata.outputs.package-ecosystem != 'github-actions' ||
          (
            steps.metadata.outputs.update-type != 'version-update:semver-patch' &&
            steps.metadata.outputs.update-type != 'version-update:semver-minor'
          )
        run: |
          echo "Auto-merge skipped for ecosystem='${{ steps.metadata.outputs.package-ecosystem }}', update-type='${{ steps.metadata.outputs.update-type }}'"
          echo "Policy: only github-actions patch/minor updates are auto-merged."
