name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      AUTH_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: auth-ci

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust compile check
        run: cargo check --all-targets --all-features

      - name: Rust clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests (with Postgres adapter coverage)
        run: cargo test --all-features -- --test-threads=1

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: auth-ci

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny advisories
        run: cargo deny check advisories

  observability:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      STRICT_PROMTOOL: "true"
      PROMTOOL_VERSION: "3.10.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install promtool
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSL -o /tmp/prometheus.tar.gz "https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz"
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          install -m 0755 "/tmp/prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool" "$HOME/.local/bin/promtool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify promtool
        run: promtool --version

      - name: Validate observability artifacts
        run: ./scripts/validate-observability-artifacts.sh

  deploy-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      KUSTOMIZE_VERSION: "5.4.3"
      IMAGE_DIGEST: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
      INGRESS_HOST: "auth.example.org"
      TLS_SECRET_NAME: "auth-prod-tls"
      POSTGRES_CIDR: "10.20.0.0/24"
      REDIS_CIDR: "10.30.0.0/24"
      AUTH_V2_ENABLED: "true"
      AUTH_V2_METHODS_ENABLED: "true"
      AUTH_V2_PASSWORD_PAKE_ENABLED: "true"
      AUTH_V2_PASSWORD_UPGRADE_ENABLED: "true"
      AUTH_V2_PASSKEY_NAMESPACE_ENABLED: "false"
      AUTH_V2_AUTH_FLOWS_ENABLED: "true"
      AUTH_V2_LEGACY_FALLBACK_MODE: "allowlisted"
      AUTH_V2_CLIENT_ALLOWLIST: "internal-web,ios-beta"
      AUTH_V2_SHADOW_AUDIT_ONLY: "false"
      AUTH_V2_AUTH_FLOW_PRUNE_INTERVAL_SECONDS: "300"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kustomize
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          install -m 0755 /tmp/kustomize /usr/local/bin/kustomize

      - name: Generate production overlay with auth v2 rollout sample
        run: ./scripts/generate-production-overlay.sh

      - name: Validate deploy readiness in strict mode
        env:
          STRICT_DEPLOY_VALIDATION: "true"
        run: ./scripts/validate-deploy-readiness.sh
