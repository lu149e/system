name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      AUTH_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: auth-ci

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust compile check
        run: cargo check --all-targets --all-features

      - name: Rust clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests (with Postgres adapter coverage)
        run: cargo test --all-features -- --test-threads=1

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: auth-ci

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny advisories
        run: cargo deny check advisories

  observability:
    runs-on: ubuntu-latest
    env:
      STRICT_PROMTOOL: "true"
      PROMTOOL_VERSION: "3.10.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install promtool
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSL -o /tmp/prometheus.tar.gz "https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz"
          tar -xzf /tmp/prometheus.tar.gz -C /tmp
          install -m 0755 "/tmp/prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool" "$HOME/.local/bin/promtool"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify promtool
        run: promtool --version

      - name: Validate observability artifacts
        run: ./scripts/validate-observability-artifacts.sh
