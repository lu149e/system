name: production-promotion-manual

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: "Runner target"
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted-auth-local
      image_digest:
        description: "Production image digest (sha256:...)"
        required: true
        type: string
      ingress_host:
        description: "Production ingress host"
        required: true
        type: string
      tls_secret_name:
        description: "TLS secret name for production ingress"
        required: true
        type: string
      postgres_cidr:
        description: "PostgreSQL egress CIDR"
        required: true
        type: string
      redis_cidr:
        description: "Redis egress CIDR"
        required: true
        type: string
      enforce_database_tls:
        description: "Set ENFORCE_DATABASE_TLS in generated production overlay"
        required: true
        default: true
        type: boolean
      enforce_redis_tls:
        description: "Set ENFORCE_REDIS_TLS in generated production overlay"
        required: true
        default: true
        type: boolean
      enforce_secure_transport:
        description: "Set ENFORCE_SECURE_TRANSPORT in generated production overlay"
        required: true
        default: true
        type: boolean
      passkey_enabled:
        description: "Set PASSKEY_ENABLED in generated production overlay"
        required: true
        default: false
        type: boolean
      passkey_rp_id:
        description: "Optional PASSKEY_RP_ID (required when passkey_enabled=true)"
        required: false
        type: string
      passkey_rp_origin:
        description: "Optional PASSKEY_RP_ORIGIN (required when passkey_enabled=true)"
        required: false
        type: string
      passkey_challenge_prune_interval_seconds:
        description: "Set PASSKEY_CHALLENGE_PRUNE_INTERVAL_SECONDS in generated production overlay"
        required: true
        default: "60"
        type: string
      login_risk_mode:
        description: "Set LOGIN_RISK_MODE in generated production overlay"
        required: true
        default: baseline
        type: choice
        options:
          - allow_all
          - baseline
      login_risk_blocked_cidrs:
        description: "Optional CSV for LOGIN_RISK_BLOCKED_CIDRS"
        required: false
        type: string
      login_risk_blocked_user_agent_substrings:
        description: "Optional CSV for LOGIN_RISK_BLOCKED_USER_AGENT_SUBSTRINGS"
        required: false
        type: string
      login_risk_blocked_email_domains:
        description: "Optional CSV for LOGIN_RISK_BLOCKED_EMAIL_DOMAINS"
        required: false
        type: string
      login_risk_challenge_cidrs:
        description: "Optional CSV for LOGIN_RISK_CHALLENGE_CIDRS"
        required: false
        type: string
      login_risk_challenge_user_agent_substrings:
        description: "Optional CSV for LOGIN_RISK_CHALLENGE_USER_AGENT_SUBSTRINGS"
        required: false
        type: string
      login_risk_challenge_email_domains:
        description: "Optional CSV for LOGIN_RISK_CHALLENGE_EMAIL_DOMAINS"
        required: false
        type: string

permissions:
  contents: read

jobs:
  production-promotion:
    runs-on: ${{ github.event.inputs.runner_target == 'self-hosted-auth-local' && fromJson('["self-hosted","linux","x64","auth-local"]') || 'ubuntu-latest' }}
    env:
      KUSTOMIZE_VERSION: "5.4.3"
      KUBECONFORM_VERSION: "0.6.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pinned promotion tooling
        run: |
          set -euo pipefail

          mkdir -p "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

          install_bin() {
            local src="$1"
            local name="$2"
            if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
              sudo install -m 0755 "${src}" "/usr/local/bin/${name}"
            else
              install -m 0755 "${src}" "${HOME}/.local/bin/${name}"
            fi
          }

          curl -sSL -o /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /tmp
          install_bin /tmp/kustomize kustomize

          curl -sSL -o /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          install_bin /tmp/kubeconform kubeconform

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify installed tooling
        run: |
          set -euo pipefail
          kustomize version
          kubeconform -v
          cosign version

      - name: Ensure scripts are executable
        run: chmod +x scripts/generate-production-overlay.sh scripts/generate-k8s-secret-manifest.sh scripts/generate-k8s-jwt-key-secret.sh scripts/validate-deploy-readiness.sh

      - name: Generate production secret manifest
        env:
          DATABASE_URL: ${{ secrets.PROD_AUTH_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_AUTH_REDIS_URL }}
          REFRESH_TOKEN_PEPPER: ${{ secrets.PROD_AUTH_REFRESH_TOKEN_PEPPER }}
          MFA_ENCRYPTION_KEY_BASE64: ${{ secrets.PROD_AUTH_MFA_ENCRYPTION_KEY_BASE64 }}
          JWT_KEYSET: ${{ secrets.PROD_AUTH_JWT_KEYSET }}
          JWT_PRIMARY_KID: ${{ secrets.PROD_AUTH_JWT_PRIMARY_KID }}
          METRICS_BEARER_TOKEN: ${{ secrets.PROD_AUTH_METRICS_BEARER_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.PROD_AUTH_SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.PROD_AUTH_SENDGRID_FROM_EMAIL }}
          VERIFY_EMAIL_URL_BASE: ${{ secrets.PROD_AUTH_VERIFY_EMAIL_URL_BASE }}
          PASSWORD_RESET_URL_BASE: ${{ secrets.PROD_AUTH_PASSWORD_RESET_URL_BASE }}
          JWT_PRIVATE_KEY_PEM: ${{ secrets.PROD_AUTH_JWT_PRIVATE_KEY_PEM }}
          JWT_PUBLIC_KEY_PEM: ${{ secrets.PROD_AUTH_JWT_PUBLIC_KEY_PEM }}
        run: |
          ./scripts/generate-k8s-secret-manifest.sh
          ./scripts/generate-k8s-jwt-key-secret.sh

      - name: Verify release signature (Cosign keyless)
        env:
          IMAGE_DIGEST: ${{ github.event.inputs.image_digest }}
          CERT_IDENTITY_REGEXP: "^https://github.com/${{ github.repository }}/.github/workflows/release-image.yml@refs/(heads/main|tags/.+)$"
        run: |
          set -euo pipefail
          mkdir -p artifacts/production-promotion
          cosign verify "ghcr.io/lu149e/system@${IMAGE_DIGEST}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "${CERT_IDENTITY_REGEXP}" \
            >"artifacts/production-promotion/cosign-verify.log"

      - name: Generate production overlay
        env:
          IMAGE_DIGEST: ${{ github.event.inputs.image_digest }}
          INGRESS_HOST: ${{ github.event.inputs.ingress_host }}
          TLS_SECRET_NAME: ${{ github.event.inputs.tls_secret_name }}
          POSTGRES_CIDR: ${{ github.event.inputs.postgres_cidr }}
          REDIS_CIDR: ${{ github.event.inputs.redis_cidr }}
          ENFORCE_DATABASE_TLS: ${{ github.event.inputs.enforce_database_tls }}
          ENFORCE_REDIS_TLS: ${{ github.event.inputs.enforce_redis_tls }}
          ENFORCE_SECURE_TRANSPORT: ${{ github.event.inputs.enforce_secure_transport }}
          PASSKEY_ENABLED: ${{ github.event.inputs.passkey_enabled }}
          PASSKEY_RP_ID: ${{ github.event.inputs.passkey_rp_id }}
          PASSKEY_RP_ORIGIN: ${{ github.event.inputs.passkey_rp_origin }}
          PASSKEY_CHALLENGE_PRUNE_INTERVAL_SECONDS: ${{ github.event.inputs.passkey_challenge_prune_interval_seconds }}
          LOGIN_RISK_MODE: ${{ github.event.inputs.login_risk_mode }}
          LOGIN_RISK_BLOCKED_CIDRS: ${{ github.event.inputs.login_risk_blocked_cidrs }}
          LOGIN_RISK_BLOCKED_USER_AGENT_SUBSTRINGS: ${{ github.event.inputs.login_risk_blocked_user_agent_substrings }}
          LOGIN_RISK_BLOCKED_EMAIL_DOMAINS: ${{ github.event.inputs.login_risk_blocked_email_domains }}
          LOGIN_RISK_CHALLENGE_CIDRS: ${{ github.event.inputs.login_risk_challenge_cidrs }}
          LOGIN_RISK_CHALLENGE_USER_AGENT_SUBSTRINGS: ${{ github.event.inputs.login_risk_challenge_user_agent_substrings }}
          LOGIN_RISK_CHALLENGE_EMAIL_DOMAINS: ${{ github.event.inputs.login_risk_challenge_email_domains }}
        run: ./scripts/generate-production-overlay.sh

      - name: Run deploy readiness validation (strict)
        env:
          STRICT_DEPLOY_VALIDATION: "true"
        run: |
          set -euo pipefail
          mkdir -p artifacts/deploy-readiness
          ./scripts/validate-deploy-readiness.sh 2>&1 | tee artifacts/deploy-readiness/validation.log

      - name: Render production manifests
        run: |
          set -euo pipefail
          mkdir -p artifacts/production-promotion
          kustomize build artifacts/production-overlay/generated \
            > artifacts/production-promotion/production-manifests.yaml
          printf '\n---\n' >> artifacts/production-promotion/production-manifests.yaml
          cat artifacts/production-secrets/auth-jwt-keys.yaml >> artifacts/production-promotion/production-manifests.yaml
          printf '\n---\n' >> artifacts/production-promotion/production-manifests.yaml
          cat artifacts/production-secrets/auth-api-secrets.yaml >> artifacts/production-promotion/production-manifests.yaml

      - name: Validate rendered manifests with kubeconform (strict)
        run: |
          set -euo pipefail
          kubeconform -strict -summary artifacts/production-promotion/production-manifests.yaml \
            > artifacts/production-promotion/kubeconform.log

      - name: Upload production manifest artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-manifest-${{ github.run_id }}
          path: artifacts/production-promotion/production-manifests.yaml
          if-no-files-found: warn

      - name: Upload promotion evidence and logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-promotion-evidence-${{ github.run_id }}
          path: |
            artifacts/production-promotion
            artifacts/deploy-readiness
            artifacts/production-overlay/generated
            artifacts/production-secrets
          if-no-files-found: warn
