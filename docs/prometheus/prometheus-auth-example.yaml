global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/auth-refresh-alert-rules.yaml

scrape_configs:
  - job_name: auth-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - auth-api.internal:8080

    # Requerido si la API define METRICS_BEARER_TOKEN o METRICS_BEARER_TOKEN_FILE
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/auth_metrics_token

    # Opcional si el endpoint /metrics esta detras de TLS interno
    # tls_config:
    #   insecure_skip_verify: false

    # Si se define METRICS_ALLOWED_CIDRS en la API,
    # la IP de origen efectiva del scraper debe pertenecer a esos rangos.
