apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-api-config
  namespace: auth
data:
  APP_ADDR: "0.0.0.0:8080"
  AUTH_RUNTIME: "postgres_redis"
  DATABASE_MAX_CONNECTIONS: "25"
  ENFORCE_DATABASE_TLS: "true"
  ENFORCE_REDIS_TLS: "true"
  ENFORCE_SECURE_TRANSPORT: "true"
  AUTH_V2_ENABLED: "false"
  AUTH_V2_METHODS_ENABLED: "false"
  AUTH_V2_PASSWORD_PAKE_ENABLED: "false"
  AUTH_V2_PASSWORD_UPGRADE_ENABLED: "false"
  AUTH_V2_PASSKEY_NAMESPACE_ENABLED: "false"
  AUTH_V2_AUTH_FLOWS_ENABLED: "false"
  AUTH_V2_LEGACY_FALLBACK_MODE: "disabled"
  AUTH_V2_CLIENT_ALLOWLIST: ""
  AUTH_V2_SHADOW_AUDIT_ONLY: "false"
  AUTH_V2_AUTH_FLOW_PRUNE_INTERVAL_SECONDS: "60"
  PASSKEY_ENABLED: "false"
  PASSKEY_RP_ID: ""
  PASSKEY_RP_ORIGIN: ""
  PASSKEY_CHALLENGE_PRUNE_INTERVAL_SECONDS: "60"
  JWT_ISSUER: "auth-api"
  JWT_AUDIENCE: "auth-clients"
  ACCESS_TTL_SECONDS: "900"
  REFRESH_TTL_SECONDS: "1209600"
  EMAIL_VERIFICATION_TTL_SECONDS: "86400"
  PASSWORD_RESET_TTL_SECONDS: "900"
  EMAIL_PROVIDER: "noop"
  EMAIL_DELIVERY_MODE: "outbox"
  EMAIL_OUTBOX_POLL_INTERVAL_MS: "1000"
  EMAIL_OUTBOX_BATCH_SIZE: "25"
  EMAIL_OUTBOX_MAX_ATTEMPTS: "8"
  LOGIN_MAX_ATTEMPTS: "5"
  LOGIN_ATTEMPT_WINDOW_SECONDS: "300"
  LOGIN_LOCKOUT_SECONDS: "900"
  LOGIN_LOCKOUT_MAX_SECONDS: "7200"
  LOGIN_ABUSE_REDIS_FAIL_MODE: "fail_closed"
  LOGIN_ABUSE_BUCKET_MODE: "email_and_ip"
  LOGIN_RISK_MODE: "baseline"
  LOGIN_RISK_BLOCKED_CIDRS: ""
  LOGIN_RISK_BLOCKED_USER_AGENT_SUBSTRINGS: ""
  LOGIN_RISK_BLOCKED_EMAIL_DOMAINS: ""
  LOGIN_RISK_CHALLENGE_CIDRS: ""
  LOGIN_RISK_CHALLENGE_USER_AGENT_SUBSTRINGS: ""
  LOGIN_RISK_CHALLENGE_EMAIL_DOMAINS: ""
  TRUST_X_FORWARDED_FOR: "true"
  TRUSTED_PROXY_CIDRS: "10.0.0.0/8"
