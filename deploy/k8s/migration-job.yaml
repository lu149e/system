apiVersion: batch/v1
kind: Job
metadata:
  name: auth-api-migrate
  namespace: auth
  labels:
    app.kubernetes.io/name: auth-api
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-api-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/lu149e/system:main
          imagePullPolicy: IfNotPresent
          command:
            - /app/auth
            - migrate
          envFrom:
            - configMapRef:
                name: auth-api-config
            - secretRef:
                name: auth-api-secrets
          volumeMounts:
            - name: jwt-keys
              mountPath: /var/run/secrets/auth/jwt
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: jwt-keys
          secret:
            secretName: auth-jwt-keys
