apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-api-default-deny-with-explicit-allows
  namespace: auth
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # Assumption: ingress controller runs in namespace `ingress-nginx`.
        # Most clusters expose this label automatically on namespaces.
        # If your controller namespace differs, replace the label value.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution (CoreDNS / kube-dns). Tune labels if your cluster differs.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL in-cluster service (same namespace by default).
    # Override for external DB endpoints is documented in deployment checklist.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis in-cluster service (same namespace by default).
    # Override for external Redis endpoints is documented in deployment checklist.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
