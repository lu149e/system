apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-api-default-deny-with-explicit-allows
  namespace: auth
spec:
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: __PRODUCTION_POSTGRES_CIDR__
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - ipBlock:
            cidr: __PRODUCTION_REDIS_CIDR__
      ports:
        - protocol: TCP
          port: 6379
