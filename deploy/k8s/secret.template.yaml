# TEMPLATE ONLY: do not apply this file directly.
# Generate a concrete manifest with scripts/generate-k8s-secret-manifest.sh.
apiVersion: v1
kind: Secret
metadata:
  name: auth-api-secrets-template-do-not-apply
  namespace: auth
type: Opaque
stringData:
  DATABASE_URL: "postgres://auth_user:replace_me@postgres.example.internal:5432/auth?sslmode=verify-full"
  REDIS_URL: "rediss://:replace_me@redis.example.internal:6380/0"
  REFRESH_TOKEN_PEPPER: "replace_with_32_plus_random_bytes"
  MFA_ENCRYPTION_KEY_BASE64: "replace_with_base64_32_byte_key"
  JWT_KEYSET: "auth-ed25519-v2|/var/run/secrets/auth/jwt/v2-private.pem|/var/run/secrets/auth/jwt/v2-public.pem,auth-ed25519-v1||/var/run/secrets/auth/jwt/v1-public.pem"
  JWT_PRIMARY_KID: "auth-ed25519-v2"
  METRICS_BEARER_TOKEN: "replace_with_long_random_token"
  SENDGRID_API_KEY: "replace_if_sendgrid_enabled"
  SENDGRID_FROM_EMAIL: "noreply@example.com"
  VERIFY_EMAIL_URL_BASE: "https://app.example.com/verify-email"
  PASSWORD_RESET_URL_BASE: "https://app.example.com/reset-password"
